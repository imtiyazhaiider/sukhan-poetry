<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Poetry Website</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8f5f0;
            color: #1f1f1f;
        }

        .poetry-font {
            font-family: 'Cormorant Garamond', serif;
        }

    </style>

</head>

<body class="antialiased">

    <!-- NAVBAR -->

    <nav class="sticky top-0 z-50 border-b border-gray-200 bg-[#f8f5f0]/90 backdrop-blur">

        <div class="max-w-7xl mx-auto px-6 py-4">

            <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4">

                <!-- LOGO -->

                <a href="/" class="flex items-center">

                    <h1 class="text-3xl poetry-font font-semibold tracking-wide hover:text-[#6b2d2d] transition">

                        Sukhan

                    </h1>

                </a>

                <!-- SEARCH -->

                <form
                    action="{% url 'search' %}"
                    method="GET"
                    class="flex-1 max-w-md"
                >

                    <input
                        type="text"
                        name="q"
                        placeholder="Search poets, ghazals, nazms..."
                        class="w-full px-5 py-3 rounded-full border border-gray-300 bg-white focus:outline-none focus:ring-2 focus:ring-[#6b2d2d]/20"
                    >

                </form>

                <!-- NAVIGATION -->

                <div class="flex flex-wrap items-center gap-4 text-sm font-medium">

                    <a
                        href="/"
                        class="hover:text-[#6b2d2d] transition"
                    >
                        Home
                    </a>

                    <a
                        href="{% url 'submit_writing' %}"
                        class="hover:text-[#6b2d2d] transition"
                    >
                        Submit Writing
                    </a>

                    <a
                        href="{% url 'writer_tools' %}"
                        class="hover:text-[#6b2d2d] transition"
                        >
                        Writer's Studio
                    </a>

                    <a
                        href="{% url 'random_poetry' %}"
                        class="px-4 py-2 border border-gray-300 rounded-full hover:bg-white transition"
                    >
                        Random Poetry
                    </a>

                    {% if user.is_authenticated %}

                        <a
                            href="{% url 'profile' %}"
                            class="hover:text-[#6b2d2d] transition"
                        >
                            Profile
                        </a>

                        <a
                            href="{% url 'logout' %}"
                            class="px-4 py-2 border border-gray-300 rounded-full hover:bg-white transition"
                        >
                            Logout
                        </a>

                    {% else %}

                        <a
                            href="{% url 'login' %}"
                            class="hover:text-[#6b2d2d] transition"
                        >
                            Login
                        </a>

                        <a
                            href="{% url 'register' %}"
                            class="px-4 py-2 bg-[#6b2d2d] text-white rounded-full hover:opacity-90 transition"
                        >
                            Sign Up
                        </a>

                    {% endif %}

                </div>

            </div>

        </div>

    </nav>

    <!-- PAGE CONTENT -->

    <main>

        {% block content %}
        {% endblock %}

    </main>

</body>
</html>
