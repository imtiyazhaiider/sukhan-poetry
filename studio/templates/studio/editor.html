{% extends 'base.html' %}

{% block content %}

<section class="py-20 px-6">

    <div class="max-w-4xl mx-auto">

        <div class="text-center mb-12">

            <h1 class="poetry-font text-6xl">
                Writer's Studio
            </h1>

            <p class="mt-4 text-gray-600">
                Write, save and refine your poetry.
            </p>

        </div>

        <form method="POST" class="space-y-6">

            {% csrf_token %}

            {{ form.as_p }}

            <button
                type="submit"
                class="px-8 py-3 bg-[#6b2d2d] text-white rounded-full"
            >
                Save Draft
            </button>

        </form>

    </div>

</section>

{% endblock %}
